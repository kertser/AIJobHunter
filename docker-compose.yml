services:
  jobhunter:
    build: .
    container_name: ai-job-hunter
    ports:
      - "80:8000"
    volumes:
      - ./data:/app/data
      # Docker socket for LLM container management from the web UI
      - /var/run/docker.sock:/var/run/docker.sock
    env_file:
      - .env
    environment:
      - JOBHUNTER_DATA_DIR=/app/data
      - JOBHUNTER_HEADLESS=true
      # Point to the LLM sidecar (used when llm_provider=local)
      - JOBHUNTER_LOCAL_LLM_URL=http://llm:8000/v1
      # Container name for Docker management from web UI
      - LLM_CONTAINER_NAME=ai-job-hunter-llm
    depends_on:
      llm:
        condition: service_started
        required: false          # app starts even if LLM is slow to load model
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s

  # ── Local LLM sidecar (OpenAI-compatible API) ───────────────────
  # Always started on deployment.  Model auto-downloaded by deploy.sh.
  # Manage from the web UI: Settings → LLM Provider → Container Control.
  llm:
    build:
      context: .
      dockerfile: Dockerfile.llm
    container_name: ai-job-hunter-llm
    volumes:
      - ./models:/models
    ports:
      - "8080:8000"            # external 8080 → container 8000 (llama-cpp default)
    # IPC_LOCK allows use_mlock (model pinned in RAM) if enabled via CLI
    cap_add:
      - IPC_LOCK
    shm_size: "512m"
    # Override model settings via environment (defaults in Dockerfile.llm)
    # environment:
    #   - MODEL=/models/model.gguf
    #   - N_CTX=4096
    #   - N_THREADS=4
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8000/v1/models"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 120s    # model loading can take 1-2 min on first start

