<!DOCTYPE html>
<html lang="en">
<head><title>Easy Apply — Step 2: Questions</title></head>
<body>
<div class="jobs-easy-apply-modal">
  <h3>Step 2 of 3: Additional questions</h3>
  <div class="jobs-easy-apply-form-section">
    <label for="years-experience">Years of Python experience</label>
    <input type="text" id="years-experience" name="years-experience" />
  </div>
  <div class="jobs-easy-apply-form-section">
    <label for="work-auth">Are you authorised to work in the US?</label>
    <select id="work-auth" name="work-auth">
      <option value="">Select…</option>
      <option value="yes">Yes</option>
      <option value="no">No</option>
    </select>
  </div>
  <button aria-label="Continue to next step">Next</button>
  <button aria-label="Dismiss">×</button>
</div>
</body>
</html>
