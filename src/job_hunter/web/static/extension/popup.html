<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <style>
    body {
      width: 340px;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      font-size: 13px;
      margin: 0;
      padding: 12px 16px;
      color: #1a1a2e;
      background: #f8f9fa;
    }
    h3 { margin: 0 0 8px; font-size: 15px; }
    .status { margin: 8px 0; padding: 8px 10px; border-radius: 6px; font-size: 12px; line-height: 1.5; }
    .status.ok { background: #d4edda; color: #155724; }
    .status.err { background: #f8d7da; color: #721c24; }
    .status.info { background: #d1ecf1; color: #0c5460; }
    label { display: block; margin: 10px 0 4px; font-weight: 500; font-size: 12px; }
    input[type="text"] {
      width: 100%; box-sizing: border-box;
      padding: 6px 8px; border: 1px solid #ccc; border-radius: 4px; font-size: 12px;
    }
    button {
      margin-top: 10px; width: 100%; padding: 8px 0;
      border: none; border-radius: 6px; cursor: pointer;
      font-size: 13px; font-weight: 600; color: #fff; background: #0a66c2;
    }
    button:hover { background: #004182; }
    button:disabled { background: #999; cursor: not-allowed; }
    .secondary { background: #6c757d; margin-top: 6px; }
    .secondary:hover { background: #545b62; }
    small { color: #666; font-size: 11px; }
  </style>
</head>
<body>
  <h3>🔗 AI Job Hunter</h3>
  <p style="margin:0 0 6px; font-size: 12px; color: #555;">
    Extract your LinkedIn <code>li_at</code> cookie and send it to the app.
  </p>

  <label>Server URL</label>
  <input type="text" id="server" value="http://localhost:8000" placeholder="http://localhost:8000">
  <small>The address of your AI Job Hunter web UI.</small>

  <button id="send-btn">🔑 Extract &amp; Send Cookie</button>
  <button id="copy-btn" class="secondary">📋 Copy Cookie to Clipboard</button>

  <div id="status" class="status info" style="display:none;"></div>

  <script src="popup.js"></script>
</body>
</html>
