<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}AI Job Hunter{% endblock %}</title>
  <link rel="icon" href="/static/favicon.ico" type="image/x-icon">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@picocss/pico@2/css/pico.min.css">
  <script src="https://unpkg.com/htmx.org@2.0.4"></script>
  <script src="https://unpkg.com/htmx-ext-sse@2.2.2/sse.js"></script>
  <style>
    :root { --pico-font-size: 15px; }
    nav { background: var(--pico-primary-background); padding: 0.5rem 1rem; }
    nav ul { list-style: none; display: flex; gap: 1rem; margin: 0; padding: 0; align-items: center; }
    nav a { color: var(--pico-primary-inverse); text-decoration: none; font-weight: 500; }
    nav a:hover { text-decoration: underline; }
    nav .brand { font-size: 1.1rem; font-weight: 700; margin-right: 1.5rem; }
    .status-badge { display: inline-block; padding: 2px 8px; border-radius: 4px; font-size: 0.8rem; font-weight: 600; text-transform: uppercase; }
    .status-new { background: #dbeafe; color: #1e40af; }
    .status-scored { background: #e0e7ff; color: #4338ca; }
    .status-queued { background: #fef3c7; color: #92400e; }
    .status-applied { background: #d1fae5; color: #065f46; }
    .status-skipped { background: #f3f4f6; color: #6b7280; }
    .status-review { background: #fef9c3; color: #854d0e; }
    .status-blocked { background: #fee2e2; color: #991b1b; }
    .status-failed { background: #fecaca; color: #dc2626; }
    .card { border: 1px solid var(--pico-muted-border-color); border-radius: 8px; padding: 1.2rem; }
    .cards-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 1rem; }
    .stat-number { font-size: 2rem; font-weight: 700; margin: 0; }
    .stat-label { color: var(--pico-muted-color); font-size: 0.85rem; }
    .toast { position: fixed; bottom: 1rem; right: 1rem; z-index: 999; padding: 0.8rem 1.2rem; border-radius: 6px; background: #065f46; color: white; display: none; }
    .toast.show { display: block; animation: fadeIn 0.3s; }
    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    #progress-log { max-height: 300px; overflow-y: auto; background: #1e293b; color: #e2e8f0; padding: 1rem; border-radius: 6px; font-family: monospace; font-size: 0.85rem; white-space: pre-wrap; }
    table { font-size: 0.9rem; }
    .action-btn { padding: 4px 10px; font-size: 0.75rem; cursor: pointer; }
  </style>
  {% block extra_head %}{% endblock %}
</head>
<body>
  <nav>
    <ul>
      <li><a href="/" class="brand">🎯 AI Job Hunter</a></li>
      <li><a href="/">Dashboard</a></li>
      <li><a href="/jobs">Jobs</a></li>
      <li><a href="/profiles">Profiles</a></li>
      <li><a href="/run">Run</a></li>
      <li><a href="/reports">Reports</a></li>
      <li><a href="/settings">Settings</a></li>
    </ul>
  </nav>

  <main class="container" style="margin-top: 1.5rem;">
    {% block content %}{% endblock %}
  </main>

  <div id="toast" class="toast"></div>

  <script>
    function showToast(msg, ms) {
      const t = document.getElementById('toast');
      t.textContent = msg;
      t.classList.add('show');
      setTimeout(() => t.classList.remove('show'), ms || 3000);
    }
  </script>
  {% block extra_scripts %}{% endblock %}
</body>
</html>
