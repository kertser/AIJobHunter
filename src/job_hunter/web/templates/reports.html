{% extends "base.html" %}
{% block title %}Reports — AI Job Hunter{% endblock %}
{% block content %}
<h2>Reports</h2>

{% if reports %}
<table>
  <thead><tr><th>Date</th><th>Actions</th></tr></thead>
  <tbody>
    {% for r in reports %}
    <tr>
      <td><a href="/api/reports/{{ r.date }}">{{ r.date }}</a></td>
      <td><a href="/api/reports/{{ r.date }}" role="button" class="outline action-btn">View</a></td>
    </tr>
    {% endfor %}
  </tbody>
</table>
{% else %}
<p style="color: var(--pico-muted-color);">No reports generated yet. Run the pipeline first.</p>
{% endif %}

<div style="margin-top: 1rem;">
  <button id="gen-report-btn" onclick="generateReport()" class="outline">📝 Generate Report</button>
</div>

<script>
function generateReport() {
  var btn = document.getElementById('gen-report-btn');
  btn.disabled = true;
  btn.textContent = '⏳ Generating…';
  fetch('/api/run/report', { method: 'POST' })
    .then(function(r) {
      if (r.ok) {
        return r.json().then(function(data) {
          showToast('Report generated for ' + data.date);
          setTimeout(function() { location.reload(); }, 600);
        });
      } else {
        r.text().then(function(t) { showToast('Error: ' + t); });
      }
    })
    .catch(function(e) { showToast('Error: ' + e); })
    .finally(function() {
      btn.disabled = false;
      btn.textContent = '📝 Generate Report';
    });
}
</script>
{% endblock %}
